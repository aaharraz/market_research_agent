name: Run Python Agent

# 1. Decide WHEN the agent should run
on:
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions tab
  schedule:
    - cron: '0 9 * * *' # Runs automatically every day at 9:00 AM UTC

# 2. Decide WHAT the agent should do
jobs:
  run-agent:
    runs-on: ubuntu-latest # The operating system for the virtual machine

    steps:
      # Step A: Copy your code into the virtual machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step B: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Change this to your preferred Python version

      # Step C: Install your dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step D: Run your agent using the hidden secrets
      - name: Run Python Agent
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_BASE_URL: ${{ secrets.CLAUDE_BASE_URL }}
        run: python agent.py